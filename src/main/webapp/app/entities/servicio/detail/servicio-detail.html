<div class="d-flex justify-content-center">
  <div class="col-8">
    @if (servicio(); as servicioRef) {
      <div>
        <h2 data-cy="servicioDetailsHeading"><span jhiTranslate="tallerApp.servicio.detail.title">Servicio</span></h2>

        <hr />

        <jhi-alert-error />

        <jhi-alert />

        <dl class="row-md jh-entity-details">
          <dt><span jhiTranslate="global.field.id">ID</span></dt>
          <dd>
            <span>{{ servicioRef.id }}</span>
          </dd>
          <dt><span jhiTranslate="tallerApp.servicio.nombre">Nombre</span></dt>
          <dd>
            <span>{{ servicioRef.nombre }}</span>
          </dd>
          <dt><span jhiTranslate="tallerApp.servicio.precio">Precio</span></dt>
          <dd>
            <span>{{ servicioRef.precio }}</span>
          </dd>
        </dl>

        <button type="submit" (click)="previousState()" class="btn btn-info" data-cy="entityDetailsBackButton">
          <fa-icon icon="arrow-left" />&nbsp;<span jhiTranslate="entity.action.back">Back</span>
        </button>

        <button type="button" [routerLink]="['/servicio', servicioRef.id, 'edit']" class="btn btn-primary">
          <fa-icon icon="pencil-alt" />&nbsp;<span jhiTranslate="entity.action.edit">Edit</span>
        </button>
      </div>
    }
  </div>
</div>
